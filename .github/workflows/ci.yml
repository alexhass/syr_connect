name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-requirements-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-requirements-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install Python dev requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Install coverage tooling
        run: |
          python -m pip install pytest-cov coverage

      - name: Export PYTHONPATH for tests
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: |
          # Run pytest with pytest-cov and write XML directly to avoid later
          # overwrites or combine issues. Also keep human-readable report.
          python -m pip install pytest-cov
          python -m pytest tests --cov=custom_components.syr_connect --cov-report=xml:coverage.xml --cov-report=term-missing -q || true

      - name: Generate coverage XML
        if: always()
        run: |
          # If pytest already produced coverage.xml, keep it. Otherwise
          # try combining coverage data and generate XML limited to our
          # integration sources.
          if [ -f coverage.xml ]; then
            echo "coverage.xml already exists; skipping generation"
            ls -la coverage.xml || true
          else
            python -m pip install coverage
            python -m coverage combine || true
            python -m coverage xml -o coverage.xml --include "custom_components/syr_connect/*"
          fi

      - name: "Debug: show coverage artifacts"
        if: always()
        run: |
          echo "Listing repo root files"
          ls -la || true
          echo "Coverage XML exists:"
          [ -f coverage.xml ] && echo yes || echo no
          echo "Coverage XML size and preview (first 200 lines):"
          if [ -f coverage.xml ]; then
            wc -c coverage.xml || true
            head -n 200 coverage.xml || true
          fi
          echo "Coverage HTML dir exists:"
          [ -d coverage_html ] && echo yes || echo no

      - name: Generate HTML coverage report
        if: always()
        run: |
          python -m pip install coverage
          coverage html -d coverage_html || true

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-html
          path: coverage_html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-requirements-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-requirements-

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run ruff lint
        run: ruff check .

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-requirements-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-requirements-

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run mypy
        run: mypy custom_components/syr_connect
